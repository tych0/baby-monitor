name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      # The networking tests stand up real WebRTC peers and a UDP RTP feed over
      # loopback, so run with the race detector to catch data races in the
      # concurrent capture/fan-out paths.
      - name: Test
        run: go test -race -timeout 120s ./...
