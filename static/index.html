<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<title>Baby Monitor</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0b1020; color: #e7ecff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px; padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
    user-select: none; -webkit-user-select: none;
  }
  h1 { font-size: 20px; font-weight: 600; letter-spacing: .5px; opacity: .85; margin: 0; }
  #toggle {
    width: min(70vw, 260px); height: min(70vw, 260px);
    border-radius: 50%; border: none; cursor: pointer;
    font-size: 34px; font-weight: 700; letter-spacing: 1px; color: #fff;
    background: #2a3354; transition: background .2s, transform .05s, box-shadow .2s;
    box-shadow: 0 10px 40px rgba(0,0,0,.45);
  }
  #toggle:active { transform: scale(.97); }
  #toggle.live   { background: #1f9d57; box-shadow: 0 0 0 8px rgba(31,157,87,.18), 0 10px 40px rgba(0,0,0,.45); }
  #toggle.busy   { background: #b8860b; }
  #toggle.off    { background: #b2374a; }
  #status { font-size: 16px; min-height: 22px; opacity: .8; text-align: center; }
  /* The talk button is deliberately small: it latches this phone into transmit
     mode (its mic is sent to all other phones) until tapped again. */
  #talk {
    width: min(46vw, 180px); height: 52px; border-radius: 26px;
    border: 1px solid #3a456e; cursor: pointer;
    font-size: 15px; font-weight: 700; letter-spacing: .6px; color: #cfd7ff;
    background: #1b2240; transition: background .2s, transform .05s, box-shadow .2s, opacity .2s;
  }
  #talk:active { transform: scale(.97); }
  #talk.tx   { background: #c0392b; color: #fff; border-color: #c0392b; box-shadow: 0 0 0 6px rgba(192,57,43,.18); }
  #talk.busy { background: #6b4a0b; color: #ffe7b0; border-color: #6b4a0b; }
  #talk[disabled] { opacity: .45; cursor: default; }
  #talkhint { font-size: 13px; min-height: 18px; opacity: .65; text-align: center; }
  #remote { font-size: 14px; min-height: 20px; text-align: center; color: #e0a72b; font-weight: 600; }
  /* Audio-only playback runs through <video> elements (iOS Safari won't reliably
     play a remote WebRTC stream from an <audio> element). One element per remote
     track: a single element renders only the first audio track of a MediaStream,
     so the baby mic and the talkback each need their own sink or talkback is
     silently dropped. Keep them in the layout but invisible — display:none would
     stop playback on iOS. */
  .sink { position: fixed; left: -9999px; top: 0; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; vertical-align: middle; background: #6b7280; }
  .dot.live { background: #2bd576; animation: pulse 1.6s infinite; }
  .dot.busy { background: #e0a72b; }
  .dot.off  { background: #e0556b; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
</style>
</head>
<body>
  <h1>BABY MONITOR</h1>
  <button id="toggle" class="off">START</button>
  <div id="status"><span class="dot off"></span>Tap to start listening</div>
  <button id="talk" disabled>TALK</button>
  <div id="talkhint"></div>
  <div id="remote"></div>
  <div id="sinks"></div>

<script>
(() => {
  "use strict";
  const sinks = document.getElementById("sinks");
  const toggle = document.getElementById("toggle");
  const status = document.getElementById("status");
  const talk = document.getElementById("talk");
  const talkhint = document.getElementById("talkhint");
  const remote = document.getElementById("remote");

  // Stable per-tab id so the server can tie /offer to /talk (the mic lock).
  const clientId = (crypto.randomUUID && crypto.randomUUID())
    || (Date.now() + "-" + Math.random().toString(16).slice(2));

  let pc = null;
  let running = false;          // user intent: should we be listening?
  let transmitting = false;     // user intent: is this phone the mic?
  let remoteTalker = "";        // id of whichever phone holds the mic (per the server), or ""
  let reconnectTimer = null;
  let backoff = 500;            // ms, grows to a cap on repeated failures
  let lastBytes = 0, stalls = 0;
  let micStream = null, micTrack = null, micSender = null;

  // One playback element per remote track (baby mic, talkback). A single media
  // element only renders the first audio track of a MediaStream, so mixing both
  // into one element silently drops the talkback; give each its own sink.
  // Keyed by the MediaStreamTrack so we can tear an element down when its track
  // ends (e.g. on reconnect).
  const trackSinks = new Map();

  function addSink(track) {
    const el = document.createElement("video");
    el.className = "sink";
    el.autoplay = true;
    el.playsInline = true;
    el.srcObject = new MediaStream([track]);
    sinks.appendChild(el);
    trackSinks.set(track, el);
    track.addEventListener("ended", () => dropSink(track));
    if (!transmitting) el.play().catch(onAutoplayBlocked);
  }

  function dropSink(track) {
    const el = trackSinks.get(track);
    if (!el) return;
    el.srcObject = null;
    el.remove();
    trackSinks.delete(track);
  }

  function clearSinks() {
    trackSinks.forEach((el) => { el.srcObject = null; el.remove(); });
    trackSinks.clear();
  }

  function playSinks() { trackSinks.forEach((el) => el.play().catch(() => {})); }
  function pauseSinks() { trackSinks.forEach((el) => el.pause()); }
  function sinksPaused() { for (const el of trackSinks.values()) { if (el.paused) return true; } return false; }

  function setUI(state, text) {
    toggle.className = state;             // live | busy | off
    toggle.textContent = (state === "off") ? "START" : "STOP";
    status.innerHTML = `<span class="dot ${state}"></span>${text}`;
    setTalkUI();
  }

  // setTalkUI reflects both our own transmit state and the server's view of who
  // holds the mic: the talk button is disabled while another phone is talking
  // (and shows it as busy), and a banner names that someone else is transmitting.
  function setTalkUI() {
    const otherTalking = remoteTalker !== "" && remoteTalker !== clientId;
    // Talk is only usable once we have a live connection and nobody else holds it.
    talk.disabled = !running || !secureMic || (otherTalking && !transmitting);
    if (transmitting) { talk.className = "tx"; talk.textContent = "TRANSMITTING"; }
    else if (otherTalking) { talk.className = "busy"; talk.textContent = "TALK"; }
    else { talk.className = ""; talk.textContent = "TALK"; }
    remote.textContent = otherTalking ? "📢 Another phone is talking" : "";
  }

  function cleanupPC() {
    if (pc) {
      pc.onconnectionstatechange = null;
      pc.ontrack = null;
      try { pc.close(); } catch (_) {}
      pc = null;
      micSender = null;
    }
  }

  // Wait (briefly) for ICE gathering to finish so the offer carries candidates;
  // the server uses non-trickle signaling.
  function iceGatheringComplete(pc) {
    if (pc.iceGatheringState === "complete") return Promise.resolve();
    return new Promise((resolve) => {
      const done = () => { pc.removeEventListener("icegatheringstatechange", check); resolve(); };
      const check = () => { if (pc.iceGatheringState === "complete") done(); };
      pc.addEventListener("icegatheringstatechange", check);
      setTimeout(done, 2000); // LAN gathers fast; don't wait forever
    });
  }

  async function connect() {
    cleanupPC();
    setUI("busy", "connecting…");
    lastBytes = 0; stalls = 0;

    pc = new RTCPeerConnection();        // host candidates only — fine on a LAN
    // m-line order matters: the server fills the two recvonly lines (baby mic,
    // talkback) in order, then treats the third as our outgoing mic.
    pc.addTransceiver("audio", { direction: "recvonly" });
    pc.addTransceiver("audio", { direction: "recvonly" });
    micSender = pc.addTransceiver("audio", { direction: "sendrecv" }).sender;

    clearSinks();
    pc.ontrack = (e) => {
      // Keep a larger receiver jitter buffer so a cold start or WiFi hiccup
      // doesn't cause gaps. ~0.5s of added latency is fine for a monitor.
      // Two property names for cross-browser coverage; unknown ones are ignored.
      try { e.receiver.jitterBufferTarget = 500; } catch (_) {}
      try { e.receiver.playoutDelayHint = 0.5; } catch (_) {}
      addSink(e.track);
    };
    pc.onconnectionstatechange = () => {
      if (!pc) return;
      const s = pc.connectionState;
      if (s === "connected") {
        backoff = 500;
        setUI("live", transmitting ? "transmitting" : "live");
        // Re-apply the mic to the fresh connection if we reconnected mid-talk;
        // the server keeps our lock across reconnects.
        if (transmitting && micTrack && micSender) {
          micSender.replaceTrack(micTrack).catch(() => {});
          micTrack.enabled = true;
        }
      }
      else if (s === "failed" || s === "disconnected" || s === "closed") { scheduleReconnect(); }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await iceGatheringComplete(pc);

    const resp = await fetch("/offer?id=" + encodeURIComponent(clientId), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(pc.localDescription),
    });
    if (!resp.ok) throw new Error("offer rejected: " + resp.status);
    await pc.setRemoteDescription(await resp.json());
  }

  function scheduleReconnect() {
    if (!running || reconnectTimer) return;
    cleanupPC();
    setUI("busy", "reconnecting…");
    reconnectTimer = setTimeout(async () => {
      reconnectTimer = null;
      if (!running) return;
      try { await connect(); }
      catch (_) { backoff = Math.min(backoff * 2, 8000); scheduleReconnect(); }
    }, backoff);
    backoff = Math.min(backoff * 2, 8000);
  }

  // Autoplay was blocked: keep "running" off and let the next tap supply the
  // user gesture the browser requires before it will play audio.
  function onAutoplayBlocked() {
    running = false;
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    cleanupPC();
    setUI("off", "Tap to start listening");
  }

  async function start() {
    running = true;
    backoff = 500;
    try { await connect(); }
    catch (_) { scheduleReconnect(); }
  }

  function stop() {
    running = false;
    if (transmitting) setTransmit(false);
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    cleanupPC();
    clearSinks();
    setUI("off", "stopped");
  }

  toggle.addEventListener("click", () => { running ? stop() : start(); });

  // --- Push-to-talk (latching transmit mode) -----------------------------

  // getUserMedia needs a secure context (HTTPS or localhost); over plain LAN
  // HTTP the API is absent. Disable talk and explain rather than failing on tap.
  const secureMic = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
  if (!secureMic) talkhint.textContent = "Talk needs HTTPS — start the server with -tls (mic is blocked on plain HTTP).";

  async function ensureMic() {
    if (micTrack && micTrack.readyState === "live") return micTrack;
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
    });
    micTrack = micStream.getAudioTracks()[0];
    micTrack.enabled = false;
    return micTrack;
  }

  // Latch this phone into (or out of) transmit mode. While transmitting we are
  // the single mic: the server relays our audio to every other phone, and we
  // pause our own playback to avoid feeding our speaker back into the mic.
  async function setTransmit(on) {
    if (on) {
      if (!running || !secureMic) return;
      talkhint.textContent = "";
      let t;
      try { t = await ensureMic(); }
      catch (_) { talkhint.textContent = "Microphone permission denied."; return; }

      const resp = await fetch(`/talk?id=${encodeURIComponent(clientId)}&op=acquire`, { method: "POST" });
      if (resp.status === 409) { talk.className = "busy"; talkhint.textContent = "Another phone is transmitting."; return; }
      if (!resp.ok) { talkhint.textContent = "Could not start transmitting."; return; }

      transmitting = true;
      if (micSender) await micSender.replaceTrack(t).catch(() => {});
      t.enabled = true;
      pauseSinks();
      setTalkUI();
      setUI("live", "transmitting");
    } else {
      transmitting = false;
      if (micTrack) micTrack.enabled = false;
      if (micSender) micSender.replaceTrack(null).catch(() => {});
      // Best-effort lock release (ignored if we never held it).
      fetch(`/talk?id=${encodeURIComponent(clientId)}&op=release`, { method: "POST" }).catch(() => {});
      talkhint.textContent = "";
      setTalkUI();
      if (running) { setUI("live", "live"); playSinks(); }
    }
  }

  talk.addEventListener("click", () => { transmitting ? setTransmit(false) : setTransmit(true); });

  // Media-session controls (lock screen / headset buttons).
  if ("mediaSession" in navigator) {
    try {
      navigator.mediaSession.metadata = new MediaMetadata({ title: "Baby Monitor", artist: "Live microphone" });
      navigator.mediaSession.setActionHandler("play",  () => { if (!running) start(); });
      navigator.mediaSession.setActionHandler("pause", () => { if (running) stop(); });
    } catch (_) {}
  }

  // Watchdog: if audio bytes stop flowing while we think we're connected, the
  // stream has silently stalled — force a reconnect. (Skip while transmitting:
  // we intentionally aren't receiving then.)
  setInterval(async () => {
    if (!running || transmitting || !pc || pc.connectionState !== "connected") return;
    try {
      const stats = await pc.getStats();
      // Sum across both inbound audio receivers (baby mic + talkback); reading a
      // single one risks latching onto the usually-idle talkback and reconnecting
      // in a loop. The baby mic always flows, so the total keeps climbing.
      let bytes = 0;
      stats.forEach((r) => { if (r.type === "inbound-rtp" && r.kind === "audio") bytes += r.bytesReceived || 0; });
      if (bytes > lastBytes) { lastBytes = bytes; stalls = 0; }
      else if (++stalls >= 3) { stalls = 0; scheduleReconnect(); }
    } catch (_) {}
  }, 3000);

  // Coming back from a locked/backgrounded screen: make sure we're still live.
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState !== "visible" || !running) return;
    if (!pc || ["failed", "disconnected", "closed"].includes(pc.connectionState)) scheduleReconnect();
    else if (!transmitting && sinksPaused()) playSinks();
  });

  // Subscribe to the server's talker feed so we can show when another phone is
  // transmitting and lock out our own talk button while it holds the mic. Each
  // message is the current talker's id ("" for none). EventSource reconnects on
  // its own; if the talker changed while we were disconnected the server replays
  // the current value on resubscribe, so we always converge to the live state.
  function subscribeTalker() {
    const es = new EventSource("/events");
    es.onmessage = (e) => {
      remoteTalker = e.data || "";
      // The server is authoritative: if it says we're no longer the talker (lock
      // lost on a reconnect, say) but we still think we are, drop transmit mode.
      if (transmitting && remoteTalker !== clientId) setTransmit(false);
      setTalkUI();
    };
  }
  subscribeTalker();

  // Stream by default where the browser allows autoplay; otherwise the page
  // falls back to the tap-to-start button via onAutoplayBlocked().
  start();
})();
</script>
</body>
</html>
